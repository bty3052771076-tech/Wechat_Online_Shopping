version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-shop-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=wechat_shop
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-default_secure_password}
      - JWT_SECRET=${JWT_SECRET:-change_this_jwt_secret_in_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - UPLOAD_PATH=./uploads/products
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-2097152}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PATH=./logs
      - WECHAT_APPID=${WECHAT_APPID:-wx06e38f82f0bafd80}
      - WECHAT_SECRET=${WECHAT_SECRET:-your-wechat-secret}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wechat-shop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: wechat-shop-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-default_secure_password}
      - MYSQL_DATABASE=wechat_shop
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - wechat-shop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-default_secure_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

# Named Volumes
volumes:
  mysql_data:
    driver: local

# Networks
networks:
  wechat-shop-network:
    driver: bridge
